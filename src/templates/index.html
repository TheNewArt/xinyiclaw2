<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XinyiClaw 2 - Agent Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; background: #0f0f1a; color: #fff; }

        .sidebar { width: 260px; background: #1a1a2e; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #333; }
        .sidebar-header h2 { font-size: 14px; color: #888; margin-bottom: 10px; }
        .new-chat-btn { width: 100%; padding: 10px; background: #3b82f6; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 14px; }
        .new-chat-btn:hover { background: #2563eb; }
        .session-list { flex: 1; overflow-y: auto; padding: 8px; }
        .session-item { display: flex; align-items: center; padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; }
        .session-item:hover { background: #2a2a4e; }
        .session-item.active { background: #3b82f6; }
        .session-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .session-delete { opacity: 0; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; padding: 0 4px; }
        .session-item:hover .session-delete { opacity: 1; }

        .main { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 12px 20px; background: #1a1a2e; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .chat-header h1 { font-size: 16px; }
        .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; }
        .status-dot.processing { background: #fbbf24; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
        .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; }
        .welcome h2 { font-size: 20px; color: #888; margin-bottom: 8px; }

        .message { margin-bottom: 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { text-align: right; }
        .message-content { display: inline-block; max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; text-align: left; }
        .message.user .message-content { background: #3b82f6; }
        .message.assistant .message-content { background: #2a2a4e; }

        .trace-toggle { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; padding: 4px 10px; background: #333; border: none; border-radius: 4px; color: #888; font-size: 11px; cursor: pointer; }
        .trace-toggle:hover { background: #444; color: #fff; }

        .trace-panel { display: none; margin-top: 10px; background: #1a1a2e; border-radius: 8px; padding: 12px; font-size: 12px; max-height: 300px; overflow-y: auto; }
        .trace-panel.show { display: block; }
        .trace-item { padding: 8px 10px; margin: 6px 0; background: #252540; border-radius: 4px; border-left: 3px solid #666; }
        .trace-item.observe { border-left-color: #6366f1; }
        .trace-item.plan { border-left-color: #8b5cf6; }
        .trace-item.act { border-left-color: #ec4899; }
        .trace-item.tool { border-left-color: #ec4899; }
        .trace-item.result { border-left-color: #10b981; }
        .trace-item.evaluate { border-left-color: #10b981; }
        .trace-item.error { border-left-color: #ef4444; }
        .trace-item.correct { border-left-color: #f59e0b; }
        .trace-item.done { border-left-color: #4ade80; }
        .trace-label { font-size: 10px; color: #888; margin-bottom: 4px; }

        .chat-input-area { padding: 12px 20px; background: #1a1a2e; border-top: 1px solid #333; }
        .input-wrapper { display: flex; gap: 10px; }
        .input-box { flex: 1; display: flex; background: #252540; border-radius: 8px; padding: 2px; }
        .input-box textarea { flex: 1; background: none; border: none; padding: 10px 14px; color: #fff; font-size: 14px; resize: none; outline: none; max-height: 150px; }
        .input-box textarea::placeholder { color: #666; }
        .send-btn { padding: 10px 20px; background: #3b82f6; border: none; border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; }
        .send-btn:hover { background: #2563eb; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .send-btn.stop { background: #ef4444; }
        .send-btn.stop:hover { background: #dc2626; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>会话</h2>
            <button class="new-chat-btn" onclick="createSession()">+ 新建会话</button>
        </div>
        <div class="session-list" id="sessionList"></div>
    </div>

    <div class="main">
        <div class="chat-header">
            <h1>XinyiClaw 2</h1>
            <div class="status"><span class="status-dot" id="statusDot"></span><span id="statusText">就绪</span></div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome"><h2>XinyiClaw 2</h2><p>输入消息开始对话</p></div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <div class="input-box"><textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea></div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

<script>
// 全局状态
let currentSession = 'default';
let isProcessing = false;
let abortController = null;

// 会话消息存储 (每个会话独立的聊天历史)
const sessionMessages = {};

// 页面加载
document.addEventListener('DOMContentLoaded', () => {
    loadSessions();
    loadSessionMessages(currentSession);

    document.getElementById('messageInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('messageInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });
});

// 加载会话列表
async function loadSessions() {
    try {
        const res = await fetch('/api/sessions');
        const data = await res.json();
        // 确保 default 会话存在
        if (!data.sessions.includes('default')) {
            data.sessions.unshift('default');
        }
        document.getElementById('sessionList').innerHTML = data.sessions.map(s => `
            <div class="session-item ${s === currentSession ? 'active' : ''}" onclick="switchSession('${s}')">
                <span class="session-name">${s === 'default' ? '默认会话' : s}</span>
                <button class="session-delete" onclick="event.stopPropagation(); deleteSession('${s}')" title="删除会话">x</button>
            </div>
        `).join('');
    } catch (e) { console.error(e); }
}

// 创建新会话
async function createSession() {
    try {
        const res = await fetch('/api/sessions', { method: 'POST' });
        const data = await res.json();
        currentSession = data.session_id;
        loadSessions();
        clearMessages();
        sessionMessages[currentSession] = [];
    } catch (e) { console.error(e); }
}

// 切换会话
function switchSession(sid) {
    // 保存当前会话消息
    saveSessionMessages(currentSession);

    // 切换会话
    currentSession = sid;

    // 加载新会话消息
    loadSessionMessages(sid);

    // 更新UI
    loadSessions();
}

// 保存会话消息到内存
function saveSessionMessages(sid) {
    const container = document.getElementById('chatMessages');
    sessionMessages[sid] = container.innerHTML;
}

// 加载会话消息
function loadSessionMessages(sid) {
    const container = document.getElementById('chatMessages');
    if (sessionMessages[sid]) {
        container.innerHTML = sessionMessages[sid];
        container.scrollTop = container.scrollHeight;
    } else {
        clearMessages();
    }
}

// 删除会话
async function deleteSession(sid) {
    if (sid === 'default') return; // 不能删除默认会话
    delete sessionMessages[sid];
    await fetch(`/api/sessions/${sid}`, { method: 'DELETE' });
    if (sid === currentSession) {
        currentSession = 'default';
        loadSessionMessages('default');
    }
    loadSessions();
}

// 清空消息显示
function clearMessages() {
    document.getElementById('chatMessages').innerHTML = '<div class="welcome"><h2>XinyiClaw 2</h2><p>输入消息开始对话</p></div>';
}

// 添加消息到聊天区域
function addMessage(role, content) {
    const container = document.getElementById('chatMessages');
    // 移除欢迎页
    const welcome = container.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="message-content">${content}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

// 添加追踪项
function addTraceItem(panel, type, content) {
    const div = document.createElement('div');
    div.className = `trace-item ${type}`;
    div.innerHTML = `<div class="trace-label">${type.toUpperCase()}</div>${content}`;
    panel.querySelector('.trace-items').appendChild(div);
    panel.scrollTop = panel.scrollHeight;
}

// 切换追踪面板
function toggleTrace(btn, panelId) {
    const panel = document.getElementById(panelId);
    panel.classList.toggle('show');
    btn.classList.toggle('active', panel.classList.contains('show'));
}

// 开始处理
function startProcessing() {
    isProcessing = true;
    abortController = new AbortController();

    const btn = document.getElementById('sendBtn');
    btn.textContent = '停止';
    btn.className = 'send-btn stop';
    btn.onclick = stopProcessing;

    document.getElementById('statusDot').classList.add('processing');
    document.getElementById('statusText').textContent = '处理中';
}

// 停止处理
function stopProcessing() {
    if (abortController) {
        abortController.abort();
        abortController = null;
    }
    isProcessing = false;
    resetSendBtn();

    // 标记消息为已取消
    const lastMsg = document.querySelector('.message.assistant:last-child .message-content');
    if (lastMsg && lastMsg.innerHTML.includes('处理中')) {
        lastMsg.innerHTML = '<span style="color:#f59e0b">已取消</span>';
    }
}

// 重置按钮
function resetSendBtn() {
    isProcessing = false;
    const btn = document.getElementById('sendBtn');
    btn.textContent = '发送';
    btn.className = 'send-btn';
    btn.onclick = sendMessage;
    document.getElementById('statusDot').classList.remove('processing');
    document.getElementById('statusText').textContent = '就绪';
}

// 更新状态
function updateStatus(text) {
    document.getElementById('statusText').textContent = text;
}

// 发送消息
async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if (!message || isProcessing) return;

    // 保存欢迎页内容
    saveSessionMessages(currentSession);

    addMessage('user', message);
    input.value = '';
    input.style.height = 'auto';
    startProcessing();

    const msgEl = addMessage('assistant', '<span style="color:#888">处理中...</span>');
    const contentEl = msgEl.querySelector('.message-content');

    // 添加追踪面板
    const tracePanel = document.createElement('div');
    tracePanel.className = 'trace-panel';
    tracePanel.id = 'trace-' + Date.now();
    tracePanel.innerHTML = '<div class="trace-items"></div>';
    msgEl.appendChild(tracePanel);

    const traceBtn = document.createElement('button');
    traceBtn.className = 'trace-toggle';
    traceBtn.innerHTML = '📋 执行追踪';
    traceBtn.onclick = () => toggleTrace(traceBtn, tracePanel.id);
    traceBtn.style.marginTop = '8px';
    msgEl.appendChild(traceBtn);

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, session_id: currentSession }),
            signal: abortController ? abortController.signal : null
        });
        console.log('Response status:', response.status);

        const data = await response.json();
        console.log('Response data:', data);

        if (data.error) {
            contentEl.innerHTML = `<span style="color:#ef4444">错误: ${data.error}</span>`;
        } else {
            // 解析 trace 并添加到追踪面板
            if (data.trace && data.trace.length > 0) {
                data.trace.forEach(item => {
                    const content = item.content || item.response || JSON.stringify(item);
                    addTraceItem(tracePanel, item.type || 'info', content);
                });
            }
            contentEl.innerHTML = data.response || '<span style="color:#888">完成</span>';
        }
    } catch (e) {
        console.error('Fetch error:', e);
        if (e.name === 'AbortError') {
            contentEl.innerHTML = '<span style="color:#f59e0b">已取消</span>';
        } else {
            contentEl.innerHTML = `<span style="color:#ef4444">错误: ${e.message}</span>`;
        }
    } finally {
        console.log('Finally: resetting button');
        resetSendBtn();
    }
}
</script>
</body>
</html>
